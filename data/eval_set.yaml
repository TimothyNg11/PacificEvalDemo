  question: "What evidence is there that hybrid search has been successful across product, customer, and competitive perspectives?"
  gold_answer: "From the product perspective, the launch retrospective shows hybrid search achieved a 31% improvement in recall over vector-only, exceeding the 25% target. 62% of search API calls now use hybrid mode. From the customer perspective, the NPS increased from 42 to 47 after the hybrid search launch, with search relevance cited as the top satisfaction driver. From the competitive perspective, Meridian achieves 82% recall vs DocuVerse's 64% with vector-only, and the NovaTech case study shows a customer switching from DocuVerse specifically because of hybrid search with reranking."
