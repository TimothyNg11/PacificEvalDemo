  question: "When Meridian's website went down in September, how long were customers unable to use it and what went wrong?"
  gold_answer: "The Search Service experienced a complete outage on September 14, 2024, lasting 47 minutes. The root cause was a human error in scheduling a database maintenance script — the cron expression was set to 2 PM instead of 2 AM, causing an index rebuild during peak hours. The dropped index caused all queries to fall back to sequential scan, overwhelming the database. 12,400 active users were affected and the estimated revenue impact was $185,000."
