- id: sf_001
  question: "What deployment strategy does Meridian Technologies use for customer-facing services?"
  gold_answer: "Meridian Technologies uses a blue-green deployment strategy for all customer-facing services. The process involves building a Docker image, deploying to the inactive environment, running smoke tests, switching the load balancer, and monitoring error rates for 15 minutes with automatic rollback if error rates exceed 0.5%."
  gold_source_ids:
    - "engineering/deployment_guide.md"
  key_facts:
    - "blue-green"
    - "15 minutes"
    - "0.5%"
  category: single_doc_factual
  difficulty: easy

- id: sf_002
  question: "What is the minimum code coverage requirement for unit tests at Meridian?"
  gold_answer: "All repositories at Meridian Technologies must maintain a minimum of 92% code coverage for unit tests. Coverage drops below 92% block the PR from merging. The payment-service has a stricter requirement of 95% minimum coverage."
  gold_source_ids:
    - "engineering/ci_cd_pipeline.md"
  key_facts:
    - "92%"
    - "payment-service"
    - "95%"
  category: single_doc_factual
  difficulty: easy

- id: sf_003
  question: "What are the core values of Meridian Technologies?"
  gold_answer: "Meridian Technologies has five core values: Customer Obsession (every decision starts with the customer), Bias for Action (move fast, iterate, ship), Radical Transparency (default to sharing information), Continuous Learning (invest in growth), and One Team (no silos, no politics, we win together)."
  gold_source_ids:
    - "hr/onboarding_handbook.md"
  key_facts:
    - "Customer Obsession"
    - "Bias for Action"
    - "Radical Transparency"
    - "Continuous Learning"
    - "One Team"
  category: single_doc_factual
  difficulty: easy

- id: sf_004
  question: "What is the current NPS score for Meridian's product and how has it changed over time?"
  gold_answer: "Meridian's Q3 2024 NPS is 47, up from 42 in Q2 2024 and 38 in Q1 2024. By segment, Enterprise NPS is 52, Mid-Market is 45, and SMB is 38. The improvement is driven by increased satisfaction with search relevance following the hybrid search launch."
  gold_source_ids:
    - "product/customer_feedback_summary.md"
  key_facts:
    - "47"
    - "42"
    - "38"
    - "hybrid search"
  category: single_doc_factual
  difficulty: easy

- id: sf_005
